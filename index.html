<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance Jakarta 5&6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #fbbf24;
            --secondary: #1e40af;
        }
        body {
            background-color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .sidebar {
            transition: transform 0.3s ease-in-out;
            z-index: 50;
        }
        .sidebar.closed {
            transform: translateX(-100%);
        }
        .overlay {
            display: none;
            z-index: 40;
        }
        .overlay.active {
            display: block;
        }
        .nav-link.active {
            background-color: var(--primary);
            color: #1e40af;
            font-weight: bold;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Mobile Top Header -->
    <header class="bg-yellow-400 text-blue-900 p-4 flex items-center justify-between shadow-md shrink-0">
        <div class="flex items-center gap-3">
            <button id="menu-toggle" class="p-2 hover:bg-yellow-500 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <h1 class="font-bold italic text-lg truncate">MAINTENANCE JKT 5&6</h1>
        </div>
        <div id="auth-status" class="text-[10px] bg-white/40 px-2 py-1 rounded font-mono">...</div>
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        <!-- Overlay for Mobile Sidebar -->
        <div id="sidebar-overlay" class="overlay fixed inset-0 bg-black/50"></div>

        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="sidebar fixed lg:static inset-y-0 left-0 w-64 bg-blue-900 text-white flex flex-col closed lg:transform-none shadow-2xl">
            <div class="p-6 border-b border-blue-800">
                <p class="text-xs text-blue-300 uppercase tracking-widest font-bold">Menu Utama</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab('form-tab')" id="btn-form" class="nav-link active w-full flex items-center gap-3 p-3 rounded-xl transition-all">
                    <span>📝</span> <span>Input Laporan</span>
                </button>
                <button onclick="switchTab('list-tab')" id="btn-list" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all">
                    <span>📋</span> <span>Data Maintenance</span>
                </button>
                <button onclick="switchTab('chart-tab')" id="btn-chart" class="nav-link w-full flex items-center gap-3 p-3 rounded-xl transition-all">
                    <span>📊</span> <span>Dashboard Statistik</span>
                </button>
            </nav>
            <div class="p-6 bg-blue-950 text-[10px] text-blue-400">
                &copy; 2024 Maintenance System v2.0
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-8 bg-slate-50">
            
            <!-- TAB: FORM INPUT -->
            <div id="form-tab" class="tab-content max-w-2xl mx-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="bg-blue-600 p-4 flex justify-between items-center text-white">
                        <h2 id="form-title" class="font-bold flex items-center gap-2">📝 Laporan Baru</h2>
                        <button id="cancel-edit" class="hidden text-xs bg-red-500 px-2 py-1 rounded hover:bg-red-600">Batal Edit</button>
                    </div>
                    
                    <form id="maintenance-form" class="p-6 space-y-5">
                        <input type="hidden" id="edit-id">
                        
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Branch</label>
                                <select id="branch" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 ring-yellow-400 outline-none transition-all" required>
                                    <option value="">Pilih Branch</option>
                                    <optgroup label="JAKARTA 5">
                                        <option value="Jakarta 5 - Ciracas">Ciracas</option>
                                        <option value="Jakarta 5 - Cawang">Cawang</option>
                                        <option value="Jakarta 5 - Duren Sawit">Duren Sawit</option>
                                        <option value="Jakarta 5 - Rawamangun">Rawamangun</option>
                                        <option value="Jakarta 5 - Ujung Menteng">Ujung Menteng</option>
                                        <option value="Jakarta 5 - Pondok Kopi">Pondok Kopi</option>
                                    </optgroup>
                                    <optgroup label="JAKARTA 6">
                                        <option value="Jakarta 6 - Sunter">Sunter</option>
                                        <option value="Jakarta 6 - Pademangan">Pademangan</option>
                                        <option value="Jakarta 6 - Pluit">Pluit</option>
                                        <option value="Jakarta 6 - Kelapa Gading">Kelapa Gading</option>
                                        <option value="Jakarta 6 - Tanjung Priok">Tanjung Priok</option>
                                    </optgroup>
                                </select>
                            </div>
                            
                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Kategori</label>
                                <select id="category" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 ring-yellow-400 outline-none transition-all" required>
                                    <option value="">Pilih Kategori</option>
                                    <option value="Maintenance">Maintenance</option>
                                    <option value="Patroli Perangkat Distribusi">Patroli</option>
                                    <option value="Preventive DP">Preventive DP</option>
                                    <option value="Optional">Optional</option>
                                </select>
                            </div>

                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Kode DP</label>
                                <input type="text" id="dp-code" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-yellow-400" placeholder="Input Kode DP..." required>
                            </div>

                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Nama Engineer</label>
                                <input type="text" id="pic-engineer" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-yellow-400" placeholder="Nama lengkap..." required>
                            </div>

                            <div>
                                <label class="text-xs font-bold text-slate-500 uppercase ml-1">Deskripsi Pekerjaan</label>
                                <textarea id="description" rows="3" class="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 ring-yellow-400" placeholder="Detail pekerjaan..." required></textarea>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-blue-600 uppercase">Foto Sebelum</label>
                                <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-all overflow-hidden" id="label-before">
                                    <div class="flex flex-col items-center justify-center pt-2" id="empty-before">
                                        <span class="text-xl">📸</span>
                                    </div>
                                    <input type="file" id="photo-before" accept="image/*" class="hidden">
                                    <div id="preview-before" class="w-full h-full hidden"></div>
                                </label>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-green-600 uppercase">Foto Selepas</label>
                                <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition-all overflow-hidden" id="label-after">
                                    <div class="flex flex-col items-center justify-center pt-2" id="empty-after">
                                        <span class="text-xl">📸</span>
                                    </div>
                                    <input type="file" id="photo-after" accept="image/*" class="hidden">
                                    <div id="preview-after" class="w-full h-full hidden"></div>
                                </label>
                            </div>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform active:scale-95">
                            Simpan Laporan
                        </button>
                    </form>
                </div>
            </div>

            <!-- TAB: DATA LIST -->
            <div id="list-tab" class="tab-content hidden space-y-4">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">🔍 Tapis Data</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                        <select id="filter-branch" class="p-2 text-sm bg-slate-50 border rounded-lg outline-none">
                            <option value="All">Semua Branch</option>
                            <option value="Jakarta 5 - Ciracas">Ciracas</option>
                            <option value="Jakarta 5 - Cawang">Cawang</option>
                            <option value="Jakarta 5 - Duren Sawit">Duren Sawit</option>
                            <option value="Jakarta 5 - Rawamangun">Rawamangun</option>
                            <option value="Jakarta 5 - Ujung Menteng">Ujung Menteng</option>
                            <option value="Jakarta 5 - Pondok Kopi">Pondok Kopi</option>
                            <option value="Jakarta 6 - Sunter">Sunter</option>
                            <option value="Jakarta 6 - Pademangan">Pademangan</option>
                            <option value="Jakarta 6 - Pluit">Pluit</option>
                            <option value="Jakarta 6 - Kelapa Gading">Kelapa Gading</option>
                            <option value="Jakarta 6 - Tanjung Priok">Tanjung Priok</option>
                        </select>
                        <input type="text" id="filter-engineer" placeholder="Nama Engineer..." class="p-2 text-sm bg-slate-50 border rounded-lg outline-none">
                        <input type="date" id="filter-start" class="p-2 text-sm bg-slate-50 border rounded-lg outline-none">
                        <input type="date" id="filter-end" class="p-2 text-sm bg-slate-50 border rounded-lg outline-none">
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="applyFilters()" class="flex-1 bg-blue-600 text-white p-2 rounded-lg text-sm font-bold">Cari</button>
                        <button onclick="exportFilteredExcel()" class="flex-1 bg-green-600 text-white p-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2">
                            <span>📥</span> Excel
                        </button>
                    </div>
                </div>

                <div id="maintenance-list" class="space-y-3">
                    <div class="text-center py-10 text-slate-400">Memuat data...</div>
                </div>

                <div id="pagination-nav" class="flex justify-center items-center gap-2 pb-20"></div>
            </div>

            <!-- TAB: CHART (DASHBOARD) -->
            <div id="chart-tab" class="tab-content hidden space-y-6 pb-20">
                <!-- Summary & Top Engineer -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Left: Basic Stats -->
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg">
                                <p class="text-[10px] uppercase font-bold opacity-80">Total Pekerjaan</p>
                                <h2 id="total-stats" class="text-3xl font-black">0</h2>
                            </div>
                            <div class="bg-yellow-400 text-blue-900 p-4 rounded-2xl shadow-lg">
                                <p class="text-[10px] uppercase font-bold opacity-80">Aktif Hari Ini</p>
                                <h2 id="today-stats" class="text-3xl font-black">0</h2>
                            </div>
                        </div>
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                                <span>⚖️</span> Rasio JKT 5 vs JKT 6
                            </h3>
                            <div class="h-48 relative">
                                <canvas id="pieChart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Right: TOP 5 ENGINEERS -->
                    <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col">
                        <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <span>🏆</span> Top 5 Produktif Engineer
                        </h3>
                        <div id="top-engineer-list" class="flex-1 space-y-3">
                            <!-- List will be populated by JS -->
                            <div class="text-center py-10 text-slate-300 italic text-sm">Belum ada data...</div>
                        </div>
                    </div>
                </div>

                <!-- Jakarta 5 Chart -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-blue-700 mb-4 flex items-center gap-2">
                        <span>🏢</span> Jakarta 5 - Detail per Branch
                    </h3>
                    <div class="h-64 relative">
                        <canvas id="barChart5"></canvas>
                    </div>
                </div>

                <!-- Jakarta 6 Chart -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h3 class="font-bold text-indigo-700 mb-4 flex items-center gap-2">
                        <span>🏢</span> Jakarta 6 - Detail per Branch
                    </h3>
                    <div class="h-64 relative">
                        <canvas id="barChart6"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex flex-col items-center justify-center p-4" onclick="this.classList.add('hidden')">
        <img id="modal-content" src="" class="max-w-full max-h-[80vh] rounded shadow-2xl">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAxhqiPz2CbxyscKcbMGhqrE4CnttWp-d0",
            authDomain: "laporan-ticket.firebaseapp.com",
            projectId: "laporan-ticket",
            storageBucket: "laporan-ticket.firebasestorage.app",
            messagingSenderId: "507199711392",
            appId: "1:507199711392:web:20678a32781e7208c5c1c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maintenance-jkt-56';

        let currentUser = null;
        let maintenanceData = [];
        let filteredData = [];
        let isEditing = false;
        let currentPhotos = { before: "", after: "" };
        let currentPage = 1;
        let pageSize = 10;

        let pieChart, barChart5, barChart6;

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-toggle');

        const toggleMenu = () => {
            sidebar.classList.toggle('closed');
            overlay.classList.toggle('active');
        };

        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);

        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            if (tabId === 'form-tab') document.getElementById('btn-form').classList.add('active');
            else if (tabId === 'list-tab') document.getElementById('btn-list').classList.add('active');
            else if (tabId === 'chart-tab') {
                document.getElementById('btn-chart').classList.add('active');
                renderCharts();
            }

            if (window.innerWidth < 1024) toggleMenu();
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-status').innerText = "ID: " + user.uid.substring(0, 5);
                loadData();
            } else {
                signInAnonymously(auth);
            }
        });

        const getBase64 = (file) => new Promise((res, rej) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => res(reader.result);
            reader.onerror = e => rej(e);
        });

        const handleImagePreview = async (input, previewId, emptyId) => {
            if (input.files[0]) {
                const b64 = await getBase64(input.files[0]);
                const preview = document.getElementById(previewId);
                preview.innerHTML = `<img src="${b64}" class="w-full h-full object-cover">`;
                preview.classList.remove('hidden');
                document.getElementById(emptyId).classList.add('hidden');
            }
        };

        document.getElementById('photo-before').addEventListener('change', (e) => handleImagePreview(e.target, 'preview-before', 'empty-before'));
        document.getElementById('photo-after').addEventListener('change', (e) => handleImagePreview(e.target, 'preview-after', 'empty-after'));

        function loadData() {
            if (!currentUser) return;
            const dataRef = collection(db, 'artifacts', appId, 'public', 'data', 'maintenance_reports');
            onSnapshot(dataRef, (snapshot) => {
                maintenanceData = [];
                snapshot.forEach((doc) => maintenanceData.push({ id: doc.id, ...doc.data() }));
                maintenanceData.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                applyFilters();
                updateStats();
                if(!document.getElementById('chart-tab').classList.contains('hidden')) renderCharts();
            });
        }

        function updateStats() {
            document.getElementById('total-stats').innerText = maintenanceData.length;
            const todayStr = new Date().toISOString().split('T')[0];
            const todayCount = maintenanceData.filter(item => {
                if(!item.createdAt) return false;
                return new Date(item.createdAt.seconds * 1000).toISOString().split('T')[0] === todayStr;
            }).length;
            document.getElementById('today-stats').innerText = todayCount;
        }

        window.applyFilters = () => {
            const fBranch = document.getElementById('filter-branch').value;
            const fEngineer = document.getElementById('filter-engineer').value.toLowerCase();
            const fStart = document.getElementById('filter-start').value;
            const fEnd = document.getElementById('filter-end').value;

            filteredData = maintenanceData.filter(item => {
                const matchB = fBranch === "All" || item.branch === fBranch;
                const matchE = !fEngineer || (item.picEngineer && item.picEngineer.toLowerCase().includes(fEngineer));
                let matchD = true;
                if (item.createdAt) {
                    const iDate = new Date(item.createdAt.seconds * 1000).toISOString().split('T')[0];
                    if (fStart && iDate < fStart) matchD = false;
                    if (fEnd && iDate > fEnd) matchD = false;
                }
                return matchB && matchE && matchD;
            });
            renderList();
        };

        function renderList() {
            const list = document.getElementById('maintenance-list');
            list.innerHTML = '';
            if (filteredData.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-slate-400 italic">Data tidak ditemukan.</div>';
                return;
            }

            filteredData.slice(0, 50).forEach(item => {
                const date = item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleDateString('id-ID', {day:'2-digit', month:'short'}) : '-';
                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-200";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="flex gap-1 flex-wrap">
                                <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase">${item.category}</span>
                                <span class="text-[9px] font-bold text-purple-600 bg-purple-50 px-2 py-0.5 rounded uppercase">DP: ${item.dpCode || '-'}</span>
                            </div>
                            <h4 class="font-bold text-slate-800 mt-1">${item.branch}</h4>
                        </div>
                        <span class="text-[9px] text-slate-400 font-medium">${date}</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-slate-700">👤 ${item.picEngineer || 'Anonim'}</span>
                        <div class="flex gap-1">
                            ${item.photoBefore ? `<button onclick="showImage('${item.photoBefore}')" class="text-[9px] bg-slate-100 px-2 py-1 rounded">Foto 1</button>` : ''}
                            ${item.photoAfter ? `<button onclick="showImage('${item.photoAfter}')" class="text-[9px] bg-green-50 px-2 py-1 rounded">Foto 2</button>` : ''}
                            <button onclick="startEdit('${item.id}')" class="p-1">✏️</button>
                            <button onclick="deleteReport('${item.id}')" class="p-1">🗑️</button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function renderCharts() {
            const branchCounts = {};
            const engineerCounts = {};
            const branchesJ5 = ["Jakarta 5 - Ciracas", "Jakarta 5 - Cawang", "Jakarta 5 - Duren Sawit", "Jakarta 5 - Rawamangun", "Jakarta 5 - Ujung Menteng", "Jakarta 5 - Pondok Kopi"];
            const branchesJ6 = ["Jakarta 6 - Sunter", "Jakarta 6 - Pademangan", "Jakarta 6 - Pluit", "Jakarta 6 - Kelapa Gading", "Jakarta 6 - Tanjung Priok"];
            
            maintenanceData.forEach(item => {
                branchCounts[item.branch] = (branchCounts[item.branch] || 0) + 1;
                if(item.picEngineer) {
                    const name = item.picEngineer.trim();
                    engineerCounts[name] = (engineerCounts[name] || 0) + 1;
                }
            });

            // 1. Render Top Engineer List
            const topEngineerContainer = document.getElementById('top-engineer-list');
            topEngineerContainer.innerHTML = '';
            const sortedEngineers = Object.entries(engineerCounts)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5);

            if(sortedEngineers.length === 0) {
                topEngineerContainer.innerHTML = '<div class="text-center py-10 text-slate-300 italic text-sm">Belum ada data...</div>';
            } else {
                sortedEngineers.forEach(([name, count], index) => {
                    const item = document.createElement('div');
                    const medalColor = index === 0 ? 'bg-yellow-100 text-yellow-700' : (index === 1 ? 'bg-slate-100 text-slate-700' : (index === 2 ? 'bg-orange-100 text-orange-700' : 'bg-slate-50 text-slate-400'));
                    const trophy = index === 0 ? '👑' : (index === 1 ? '🥈' : (index === 2 ? '🥉' : '🔹'));
                    
                    item.className = "flex items-center justify-between p-3 rounded-xl border border-slate-100 bg-slate-50/50";
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm ${medalColor}">
                                ${trophy}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-800">${name}</p>
                                <p class="text-[10px] text-slate-500 uppercase tracking-tighter">Maintenance Specialist</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-black text-blue-600">${count}</p>
                            <p class="text-[8px] text-slate-400 font-bold uppercase">Laporan</p>
                        </div>
                    `;
                    topEngineerContainer.appendChild(item);
                });
            }

            // 2. Render Pie Chart (JKT 5 vs 6)
            const totalJ5 = branchesJ5.reduce((acc, cur) => acc + (branchCounts[cur] || 0), 0);
            const totalJ6 = branchesJ6.reduce((acc, cur) => acc + (branchCounts[cur] || 0), 0);

            const pieCtx = document.getElementById('pieChart').getContext('2d');
            if(pieChart) pieChart.destroy();
            pieChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Jakarta 5', 'Jakarta 6'],
                    datasets: [{
                        data: [totalJ5, totalJ6],
                        backgroundColor: ['#2563eb', '#6366f1'],
                        borderWidth: 4,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => {
                                    const total = totalJ5 + totalJ6;
                                    const perc = total > 0 ? ((ctx.raw / total) * 100).toFixed(1) : 0;
                                    return `${ctx.label}: ${ctx.raw} (${perc}%)`;
                                }
                            }
                        }
                    }
                }
            });

            // 3. Bar Charts
            const renderBar = (ctxId, labels, data, color) => {
                const ctx = document.getElementById(ctxId).getContext('2d');
                return new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels.map(l => l.split(' - ')[1]),
                        datasets: [{ data, backgroundColor: color, borderRadius: 6 }]
                    },
                    options: { 
                        maintainAspectRatio: false, 
                        plugins: { legend: { display: false } },
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } } }, x: { ticks: { font: { size: 9 } } } }
                    }
                });
            };

            if(barChart5) barChart5.destroy();
            barChart5 = renderBar('barChart5', branchesJ5, branchesJ5.map(b => branchCounts[b] || 0), '#3b82f6');

            if(barChart6) barChart6.destroy();
            barChart6 = renderBar('barChart6', branchesJ6, branchesJ6.map(b => branchCounts[b] || 0), '#818cf8');
        }

        // CRUD Actions
        window.deleteReport = async (id) => {
            if (confirm("Hapus data?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'maintenance_reports', id));
        };

        window.showImage = (src) => {
            document.getElementById('modal-content').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        };

        document.getElementById('image-modal').onclick = () => document.getElementById('image-modal').classList.add('hidden');

        document.getElementById('maintenance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = "Simpan...";
            const payload = {
                branch: document.getElementById('branch').value,
                category: document.getElementById('category').value,
                dpCode: document.getElementById('dp-code').value,
                picEngineer: document.getElementById('pic-engineer').value,
                description: document.getElementById('description').value,
                userId: currentUser.uid
            };
            const fBefore = document.getElementById('photo-before').files[0];
            const fAfter = document.getElementById('photo-after').files[0];
            payload.photoBefore = fBefore ? await getBase64(fBefore) : (isEditing ? currentPhotos.before : "");
            payload.photoAfter = fAfter ? await getBase64(fAfter) : (isEditing ? currentPhotos.after : "");

            try {
                if(isEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'maintenance_reports', document.getElementById('edit-id').value), { ...payload, updatedAt: serverTimestamp() });
                else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'maintenance_reports'), { ...payload, createdAt: serverTimestamp() });
                resetForm(); switchTab('list-tab');
            } catch (e) { console.error(e); }
            btn.disabled = false; btn.innerText = "Simpan Laporan";
        });

        window.startEdit = (id) => {
            const item = maintenanceData.find(d => d.id === id);
            if(!item) return;
            isEditing = true;
            document.getElementById('edit-id').value = id;
            document.getElementById('branch').value = item.branch;
            document.getElementById('category').value = item.category;
            document.getElementById('dp-code').value = item.dpCode || "";
            document.getElementById('pic-engineer').value = item.picEngineer;
            document.getElementById('description').value = item.description;
            currentPhotos = { before: item.photoBefore || "", after: item.photoAfter || "" };
            document.getElementById('form-title').innerText = "✏️ Edit Laporan";
            document.getElementById('cancel-edit').classList.remove('hidden');
            switchTab('form-tab');
        };

        const resetForm = () => {
            isEditing = false;
            document.getElementById('maintenance-form').reset();
            document.getElementById('form-title').innerText = "📝 Laporan Baru";
            document.getElementById('cancel-edit').classList.add('hidden');
            document.getElementById('preview-before').classList.add('hidden');
            document.getElementById('preview-after').classList.add('hidden');
            document.getElementById('empty-before').classList.remove('hidden');
            document.getElementById('empty-after').classList.remove('hidden');
        };

        document.getElementById('cancel-edit').onclick = resetForm;

        window.exportFilteredExcel = () => {
            const data = filteredData.map(i => ({ Tgl: i.createdAt ? new Date(i.createdAt.seconds*1000).toLocaleDateString() : '', Branch: i.branch, DP: i.dpCode, Engineer: i.picEngineer, Kategori: i.category, Deskripsi: i.description }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Maintenance");
            XLSX.writeFile(wb, "Report_Maintenance.xlsx");
        };
    </script>
</body>
</html>
